<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yılan Oyunu</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #22c55e;
            margin-bottom: 10px;
        }
        canvas {
            border: 4px solid #374151;
            background-color: #0c111d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .btn {
            background-color: #374151;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:active {
            background-color: #22c55e;
        }
    </style>
</head>
<body>

    <h1>YILAN OYUNU</h1>
    <div style="font-size: 1.2rem; margin-bottom: 10px;">Skor: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = 20;

        let snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        
        let dx = 0;
        let dy = -1;
        let food = { x: 5, y: 5 };
        let score = 0;

        // Oyun döngüsü (Saniyede ~8 kare hızında)
        setInterval(gameLoop, 130);
        document.addEventListener("keydown", handleKeyPress);

        function gameLoop() {
            // 1. Yılanı ilerlet
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 2. Yem yendi mi kontrolü
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } else {
                snake.pop();
            }

            // 3. Oyun bitti mi kontrolü (Duvarlar veya Kendi gövdesi)
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                resetGame();
                return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) {
                    resetGame();
                    return;
                }
            }

            // 4. Ekrana Çizim Yap
            ctx.fillStyle = "#0c111d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Böceği (Yemi) Çiz - Basit kırmızı kare
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Yılanı Çiz - Kafa koyu yeşil, gövde normal yeşil kareler
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#166534" : "#22c55e";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function changeDirection(newDx, newDy) {
            if (newDx === -1 && dx === 1) return;
            if (newDx === 1 && dx === -1) return;
            if (newDy === -1 && dy === 1) return;
            if (newDy === 1 && dy === -1) return;
            
            dx = newDx;
            dy = newDy;
        }

        function handleKeyPress(event) {
            const key = event.keyCode;
            if ((key === 37 || key === 65) && dx === 0) changeDirection(-1, 0); // Sol / A
            if ((key === 38 || key === 87) && dy === 0) changeDirection(0, -1); // Yukarı / W
            if ((key === 39 || key === 68) && dx === 0) changeDirection(1, 0);  // Sağ / D
            if ((key === 40 || key === 83) && dy === 0) changeDirection(0, 1);   // Aşağı / S
        }

        function resetGame() {
            alert("Oyun Bitti! Skorun: " + score);
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.innerText = score;
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }
// --- DOKUNMATİK (SWIPE) KONTROLLERİ ---
let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

// Ekrana ilk dokunulduğunda koordinatları kaydet
document.addEventListener('touchstart', function(event) {
    touchStartX = event.changedTouches[0].screenX;
    touchStartY = event.changedTouches[0].screenY;
}, false);

// Parmak ekrandan çekildiğinde yönü hesapla ve yılanı yönlendir
document.addEventListener('touchend', function(event) {
    touchEndX = event.changedTouches[0].screenX;
    touchEndY = event.changedTouches[0].screenY;
    handleSwipe();
}, false);

function handleSwipe() {
    let xDiff = touchEndX - touchStartX;
    let yDiff = touchEndY - touchStartY;
    
    // Hangi eksende daha çok hareket ettirilmiş (Yatay mı Dikey mi?)
    // En az 30 piksellik bir kaydırma (swipe) olmasını şart koşuyoruz ki yanlışlıkla dokunmalar yönü bozmasın
    if (Math.abs(xDiff) > Math.abs(yDiff)) {
        // Yatay hareket
        if (xDiff > 30 && direction !== 'LEFT') {
            direction = 'RIGHT';
        } else if (xDiff < -30 && direction !== 'RIGHT') {
            direction = 'LEFT';
        }
    } else {
        // Dikey hareket
        if (yDiff > 30 && direction !== 'UP') {
            direction = 'DOWN';
        } else if (yDiff < -30 && direction !== 'DOWN') {
            direction = 'UP';
        }
    }
}

// Telegram içinde ekranın kazara aşağı/yukarı kaymasını önlemek için (Sadece mobilde çalışır)
document.body.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
