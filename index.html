<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan Oyunu</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Ekran kaymasını tamamen engeller */
            user-select: none; /* Dokunurken metinlerin seçilmesini engeller */
        }
        h1 {
            color: #22c55e;
            margin-bottom: 5px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); /* Yeşil ışıltı */
        }
        .score-board {
            font-size: 1.4rem;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
        }
        #score {
            color: #ef4444; /* Skor kırmızı */
            font-weight: bold;
        }
        canvas {
            border: 6px solid #374151;
            background-color: #0c111d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 90vw;  /* Mobil ekranlara otomatik sığma */
            max-height: 90vw;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>YILAN OYUNU</h1>
    <div class="score-board">Skor: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = 20;

        let snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        
        let dx = 0;
        let dy = -1;
        let food = { x: 5, y: 5 };
        let score = 0;

        // Oyun döngüsü (Saniyede ~8 kare hızında)
        setInterval(gameLoop, 130);
        document.addEventListener("keydown", handleKeyPress);

        function gameLoop() {
            // 1. Yılanı ilerlet
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 2. Yem (Böcek) yendi mi kontrolü
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } else {
                snake.pop();
            }

            // 3. Oyun bitti mi kontrolü (Duvarlar veya Kendi gövdesi)
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                resetGame();
                return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) {
                    resetGame();
                    return;
                }
            }

            // 4. Ekrana Çizim Yap
            ctx.fillStyle = "#0c111d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- BÖCEĞİ (YEMİ) ÇİZ ---
            ctx.font = `${gridSize - 2}px serif`; // Emoji boyutu ayarı
            ctx.textBaseline = "top"; 
            ctx.fillText("🐞", food.x * gridSize, food.y * gridSize);

            // --- YILANI ÇİZ ---
            snake.forEach((part, index) => {
                const isHead = index === 0;

                if (isHead) {
                    // Kafa tasarımı: Koyu yeşil ve dairesel
                    ctx.fillStyle = "#166534";
                    ctx.beginPath();
                    ctx.arc(
                        part.x * gridSize + gridSize / 2, 
                        part.y * gridSize + gridSize / 2, 
                        gridSize / 2 - 1, 
                        0, 
                        Math.PI * 2
                    );
                    ctx.fill();
                    
                    // Kafaya göz detayları
                    ctx.fillStyle = "white";
                    ctx.fillRect(part.x * gridSize + 5, part.y * gridSize + 5, 3, 3);
                    ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 5, 3, 3);
                    
                } else {
                    // Gövde tasarımı: Açık yeşil ve pullu efektli kareler
                    ctx.fillStyle = "#22c55e";
                    ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 3, gridSize - 3);

                    // Pullu doku için hafif saydam iç ışıltı
                    ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
                    ctx.fillRect(part.x * gridSize + 4, part.y *
