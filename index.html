<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılan Oyunu</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            color: #22c55e;
            margin-bottom: 5px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .score-board {
            font-size: 1.4rem;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
        }
        #score {
            color: #ef4444;
            font-weight: bold;
        }
        canvas {
            border: 6px solid #374151;
            background-color: #0c111d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 90vw;
            max-height: 90vw;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>YILAN OYUNU</h1>
    <div class="score-board">Skor: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = 20;

        let snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        
        let dx = 0;
        let dy = -1;
        let food = { x: 5, y: 5 };
        let score = 0;

        // Oyun döngüsü
        setInterval(gameLoop, 130);
        document.addEventListener("keydown", handleKeyPress);

        function gameLoop() {
            // 1. Yılanı ilerlet
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // 2. Yem yendi mi kontrolü
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } else {
                snake.pop();
            }

            // 3. Oyun bitti mi kontrolü
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                resetGame();
                return;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) {
                    resetGame();
                    return;
                }
            }

            // 4. Ekrana Çizim Yap
            ctx.fillStyle = "#0c111d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- BÖCEĞİ ÇİZ ---
            ctx.fillStyle = "#ef4444"; // Emojide sorun çıkma ihtimaline karşı kırmızı renk tanımı sabitlendi
            ctx.font = "18px Arial";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText("🐞", food.x * gridSize + 1, food.y * gridSize + 1);

            // --- YILANI ÇİZ ---
            snake.forEach((part, index) => {
                if (index === 0) {
                    // Kafa: Koyu Yeşil Kare
                    ctx.fillStyle = "#166534";
                    ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                    
                    // Basit iki göz noktası
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, 3, 3);
                    ctx.fillRect(part.x * gridSize + 12, part.y * gridSize + 4, 3, 3);
                } else {
                    // Gövde: Açık Yeşil Kare
                    ctx.fillStyle = "#22c55e";
                    ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                    
                    // Pullu doku efekti
                    ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                    ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, gridSize - 10, gridSize - 10);
                }
            });
        }

        function changeDirection(newDx, newDy) {
            if (newDx === -1 && dx === 1) return;
            if (newDx === 1 && dx === -1) return;
            if (newDy === -1 && dy === 1) return;
            if (newDy === 1 && dy === -1) return;
            
            dx = newDx;
            dy = newDy;
        }

        function handleKeyPress(event) {
            const key = event.keyCode;
            if ((key === 37 || key === 65) && dx === 0) changeDirection(-1, 0);
            if ((key === 38 || key === 87) && dy === 0) changeDirection(0, -1);
            if ((key === 39 || key === 68) && dx === 0) changeDirection(1, 0);
            if ((key === 40 || key === 83) && dy === 0) changeDirection(0, 1);
        }

        function resetGame() {
            alert("Oyun Bitti! Skorun: " + score);
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.innerText = score;
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        // --- DOKUNMATİK (SWIPE) KONTROLLERİ ---
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            let xDiff = touchEndX - touchStartX;
            let yDiff = touchEndY - touchStartY;
            
            if (Math.abs(xDiff) > Math.abs(yDiff)) {
                if (xDiff > 30 && dx === 0) changeDirection(1, 0);
                else if (xDiff < -30 && dx === 0) changeDirection(-1, 0);
            } else {
                if (yDiff > 30 && dy === 0) changeDirection(0, 1);
                else if (yDiff < -30 && dy === 0) changeDirection(0, -1);
            }
        }

        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
